<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Journal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f1ee;
      --surface: #ffffff;
      --surface2: #f9f7f5;
      --border: #e5e0da;
      --text: #2c2724;
      --text-muted: #8c7f76;
      --accent: #7c6aff;
      --accent-light: #ede9ff;
      --danger: #ff6b6b;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- LAYOUT ---- */
    .app { display: flex; flex-direction: column; min-height: 100vh; max-width: 820px; margin: 0 auto; padding: 0 16px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 16px;
    }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* ---- BUTTONS ---- */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 100px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6655ee; }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #e05555; }
    .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
    .btn-outline:hover { background: var(--accent-light); }

    /* ---- FILTER BAR ---- */
    .filter-bar {
      display: flex; gap: 10px; align-items: center;
      padding: 12px 0; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; }
    .search-wrap input {
      width: 100%; padding: 9px 14px 9px 38px;
      border: 1.5px solid var(--border); border-radius: 100px;
      background: var(--surface); font-size: 14px; outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; }

    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 6px 13px; border-radius: 100px; font-size: 13px; font-weight: 500;
      border: 1.5px solid var(--border); background: var(--surface);
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* ---- ENTRY LIST ---- */
    .entry-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 40px; }

    .entry-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px; border: 1.5px solid var(--border);
      cursor: pointer; transition: all .15s; box-shadow: var(--shadow);
    }
    .entry-card:hover { border-color: var(--accent); transform: translateY(-1px); }

    .entry-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .entry-title { font-size: 16px; font-weight: 700; line-height: 1.3; }
    .entry-date { font-size: 12px; color: var(--text-muted); white-space: nowrap; margin-top: 2px; }
    .entry-emotion { font-size: 22px; flex-shrink: 0; }
    .entry-preview { font-size: 14px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .entry-footer { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    .tag-badge { background: var(--accent-light); color: var(--accent); border-radius: 100px; padding: 3px 10px; font-size: 12px; font-weight: 600; }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 52px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; }

    /* ---- MODAL OVERLAY ---- */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 820px; max-height: 92vh; overflow-y: auto;
      padding: 28px 24px 40px; transform: translateY(40px);
      transition: transform .25s cubic-bezier(.25,.8,.25,1);
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-size: 18px; font-weight: 700; }
    .close-btn { background: var(--surface2); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .close-btn:hover { background: var(--border); }

    /* ---- FORM ---- */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input, .form-textarea {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; background: var(--surface2); font-size: 15px;
      outline: none; transition: border-color .15s; color: var(--text);
      font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); background: var(--surface); }
    .form-textarea { min-height: 180px; resize: vertical; line-height: 1.7; }

    /* ---- EMOTION SELECTOR ---- */
    .emotion-grid { display: flex; gap: 10px; flex-wrap: wrap; }
    .emotion-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 14px; border-radius: 12px; border: 2px solid var(--border);
      background: var(--surface2); cursor: pointer; transition: all .15s; font-size: 13px;
    }
    .emotion-btn .em { font-size: 26px; }
    .emotion-btn:hover { border-color: var(--accent); }
    .emotion-btn.selected { border-color: var(--accent); background: var(--accent-light); font-weight: 600; color: var(--accent); }

    /* ---- TAG INPUT ---- */
    .tags-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--surface2); min-height: 48px; cursor: text; }
    .tags-input-wrap:focus-within { border-color: var(--accent); background: var(--surface); }
    .tags-input-wrap .tag-pill { display: flex; align-items: center; gap: 4px; background: var(--accent); color: #fff; border-radius: 100px; padding: 3px 10px; font-size: 13px; font-weight: 600; }
    .tags-input-wrap .tag-pill button { background: none; border: none; color: #fff; cursor: pointer; font-size: 15px; line-height: 1; padding: 0 0 0 2px; }
    .tags-input-wrap input { border: none; outline: none; background: transparent; font-size: 14px; flex: 1; min-width: 80px; color: var(--text); }

    /* ---- MODAL FOOTER ---- */
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 28px; padding-top: 20px; border-top: 1.5px solid var(--border); }

    /* ---- STATS BAR ---- */
    .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border-radius: 12px; padding: 14px 20px; border: 1.5px solid var(--border); flex: 1; min-width: 100px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ---- DETAIL VIEW ---- */
    .detail-content { white-space: pre-wrap; line-height: 1.8; font-size: 15px; background: var(--surface2); border-radius: 10px; padding: 16px; }
    .detail-emotion { font-size: 40px; margin-bottom: 8px; }
    .detail-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }

    @media (max-width: 480px) {
      .emotion-grid { gap: 7px; }
      .emotion-btn { padding: 8px 10px; font-size: 12px; }
      .emotion-btn .em { font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Mind<span>Journal</span></div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openEditor()">+ 新しい記録</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="記録を検索..." oninput="render()" />
    </div>
    <div class="filter-chips" id="filterChips"></div>
  </div>

  <!-- Entry list -->
  <div class="entry-list" id="entryList"></div>
</div>

<!-- Editor Overlay -->
<div class="overlay" id="editorOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="editorTitle">新しい記録</span>
      <button class="close-btn" onclick="closeEditor()">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">タイトル</label>
      <input type="text" class="form-input" id="entryTitleInput" placeholder="今日のタイトルを入力..." />
    </div>

    <div class="form-group">
      <label class="form-label">今の気持ち</label>
      <div class="emotion-grid" id="emotionGrid"></div>
    </div>

    <div class="form-group">
      <label class="form-label">内容</label>
      <textarea class="form-textarea" id="entryContent" placeholder="思ったこと、感じたこと、気づいたことを自由に書いてください..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">タグ（Enterで追加）</label>
      <div class="tags-input-wrap" id="tagsWrap" onclick="document.getElementById('tagInput').focus()">
        <input type="text" id="tagInput" placeholder="タグを入力..." onkeydown="handleTagInput(event)" />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" id="deleteBtn" onclick="deleteEntry()" style="display:none;margin-right:auto;">削除</button>
      <button class="btn btn-ghost" onclick="closeEditor()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEntry()">保存する</button>
    </div>
  </div>
</div>

<!-- Detail Overlay -->
<div class="overlay" id="detailOverlay" onclick="handleDetailOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">記録の詳細</span>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="deleteFromDetail()" style="margin-right:auto;">削除</button>
      <button class="btn btn-ghost" onclick="closeDetail()">閉じる</button>
      <button class="btn btn-outline btn-sm" onclick="editFromDetail()">編集する</button>
    </div>
  </div>
</div>

<script>
  /* ===== DATA ===== */
  const EMOTIONS = [
    { emoji: '😊', label: '幸せ' },
    { emoji: '😌', label: '穏やか' },
    { emoji: '🤩', label: 'ワクワク' },
    { emoji: '🥰', label: '感謝' },
    { emoji: '😢', label: '悲しい' },
    { emoji: '😤', label: '怒り' },
    { emoji: '😰', label: '不安' },
    { emoji: '😴', label: '疲れた' },
    { emoji: '🤔', label: '迷い中' },
    { emoji: '😐', label: '普通' },
  ];

  let entries = JSON.parse(localStorage.getItem('mj_entries') || '[]');
  let currentEditId = null;
  let currentDetailId = null;
  let selectedEmotion = null;
  let currentTags = [];
  let activeFilter = null; // null = all, or tag string

  function save() { localStorage.setItem('mj_entries', JSON.stringify(entries)); }

  /* ===== RENDER ===== */
  function render() {
    renderStats();
    renderFilters();
    renderList();
  }

  function renderStats() {
    const bar = document.getElementById('statsBar');
    const total = entries.length;
    const emotionCounts = {};
    entries.forEach(e => { if (e.emotion) emotionCounts[e.emotion] = (emotionCounts[e.emotion] || 0) + 1; });
    const topEmotion = Object.keys(emotionCounts).sort((a,b) => emotionCounts[b]-emotionCounts[a])[0];
    const thisMonth = entries.filter(e => {
      const d = new Date(e.date);
      const now = new Date();
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).length;

    bar.innerHTML = `
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">総記録数</div></div>
      <div class="stat-card"><div class="stat-num">${thisMonth}</div><div class="stat-label">今月の記録</div></div>
      <div class="stat-card"><div class="stat-num">${topEmotion || '—'}</div><div class="stat-label">よく感じる気持ち</div></div>
    `;
  }

  function renderFilters() {
    const allTags = [...new Set(entries.flatMap(e => e.tags || []))];
    const chips = document.getElementById('filterChips');
    chips.innerHTML = `<div class="chip ${!activeFilter ? 'active' : ''}" onclick="setFilter(null)">すべて</div>`;
    allTags.forEach(tag => {
      chips.innerHTML += `<div class="chip ${activeFilter === tag ? 'active' : ''}" onclick="setFilter('${escapeHtml(tag)}')">${escapeHtml(tag)}</div>`;
    });
  }

  function setFilter(tag) {
    activeFilter = tag;
    render();
  }

  function renderList() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    let list = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));

    if (activeFilter) list = list.filter(e => (e.tags || []).includes(activeFilter));
    if (query) list = list.filter(e =>
      e.title.toLowerCase().includes(query) ||
      e.content.toLowerCase().includes(query) ||
      (e.tags || []).some(t => t.toLowerCase().includes(query))
    );

    const el = document.getElementById('entryList');
    if (!list.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📖</div><p>まだ記録がありません。<br>「新しい記録」から始めましょう。</p></div>`;
      return;
    }

    el.innerHTML = list.map(e => `
      <div class="entry-card" onclick="openDetail('${e.id}')">
        <div class="entry-top">
          <div>
            <div class="entry-title">${escapeHtml(e.title || '無題')}</div>
            <div class="entry-date">${formatDate(e.date)}</div>
          </div>
          <div class="entry-emotion">${e.emotion || ''}</div>
        </div>
        ${e.content ? `<div class="entry-preview">${escapeHtml(e.content)}</div>` : ''}
        ${(e.tags && e.tags.length) ? `<div class="entry-footer">${e.tags.map(t => `<span class="tag-badge">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      </div>
    `).join('');
  }

  /* ===== EDITOR ===== */
  function openEditor(id = null) {
    currentEditId = id;
    selectedEmotion = null;
    currentTags = [];

    document.getElementById('editorTitle').textContent = id ? '記録を編集' : '新しい記録';
    document.getElementById('entryTitleInput').value = '';
    document.getElementById('entryContent').value = '';
    document.getElementById('deleteBtn').style.display = id ? 'inline-flex' : 'none';

    if (id) {
      const entry = entries.find(e => e.id === id);
      if (entry) {
        document.getElementById('entryTitleInput').value = entry.title || '';
        document.getElementById('entryContent').value = entry.content || '';
        selectedEmotion = entry.emotion || null;
        currentTags = [...(entry.tags || [])];
      }
    }

    renderEmotionGrid();
    renderTagPills();
    document.getElementById('editorOverlay').classList.add('open');
    setTimeout(() => document.getElementById('entryTitleInput').focus(), 200);
  }

  function closeEditor() {
    document.getElementById('editorOverlay').classList.remove('open');
    currentEditId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('editorOverlay')) closeEditor();
  }

  function saveEntry() {
    const title = document.getElementById('entryTitleInput').value.trim();
    const content = document.getElementById('entryContent').value.trim();

    if (!title && !content) {
      alert('タイトルまたは内容を入力してください。');
      return;
    }

    if (currentEditId) {
      const idx = entries.findIndex(e => e.id === currentEditId);
      if (idx !== -1) {
        entries[idx] = { ...entries[idx], title, content, emotion: selectedEmotion, tags: currentTags };
      }
    } else {
      entries.push({
        id: Date.now().toString(),
        date: new Date().toISOString(),
        title, content,
        emotion: selectedEmotion,
        tags: currentTags,
      });
    }

    save();
    closeEditor();
    render();
  }

  function deleteEntry() {
    if (!currentEditId) return;
    if (!confirm('この記録を削除しますか？')) return;
    entries = entries.filter(e => e.id !== currentEditId);
    save();
    closeEditor();
    render();
  }

  /* ===== EMOTION GRID ===== */
  function renderEmotionGrid() {
    document.getElementById('emotionGrid').innerHTML = EMOTIONS.map(em => `
      <button class="emotion-btn ${selectedEmotion === em.emoji ? 'selected' : ''}" onclick="selectEmotion('${em.emoji}')">
        <span class="em">${em.emoji}</span>${em.label}
      </button>
    `).join('');
  }

  function selectEmotion(emoji) {
    selectedEmotion = selectedEmotion === emoji ? null : emoji;
    renderEmotionGrid();
  }

  /* ===== TAG INPUT ===== */
  function handleTagInput(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,/g, '');
      if (val && !currentTags.includes(val)) {
        currentTags.push(val);
        renderTagPills();
      }
      e.target.value = '';
    } else if (e.key === 'Backspace' && !e.target.value && currentTags.length) {
      currentTags.pop();
      renderTagPills();
    }
  }

  function removeTag(tag) {
    currentTags = currentTags.filter(t => t !== tag);
    renderTagPills();
  }

  function renderTagPills() {
    const wrap = document.getElementById('tagsWrap');
    const input = document.getElementById('tagInput');
    wrap.innerHTML = '';
    currentTags.forEach(tag => {
      const pill = document.createElement('span');
      pill.className = 'tag-pill';
      pill.innerHTML = `${escapeHtml(tag)}<button onclick="removeTag('${escapeHtml(tag)}')" type="button">×</button>`;
      wrap.appendChild(pill);
    });
    wrap.appendChild(input);
    input.placeholder = currentTags.length ? '' : 'タグを入力...';
  }

  /* ===== DETAIL VIEW ===== */
  function openDetail(id) {
    currentDetailId = id;
    const entry = entries.find(e => e.id === id);
    if (!entry) return;

    document.getElementById('detailTitle').textContent = entry.title || '無題';
    document.getElementById('detailBody').innerHTML = `
      <div class="detail-emotion">${entry.emotion || ''}</div>
      <div class="detail-meta">${formatDate(entry.date)}</div>
      ${(entry.tags && entry.tags.length) ? `<div class="entry-footer" style="margin-bottom:16px;">${entry.tags.map(t => `<span class="tag-badge">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      <div class="detail-content">${escapeHtml(entry.content || '（内容なし）')}</div>
    `;
    document.getElementById('detailOverlay').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('open');
    currentDetailId = null;
  }

  function handleDetailOverlayClick(e) {
    if (e.target === document.getElementById('detailOverlay')) closeDetail();
  }

  function editFromDetail() {
    const id = currentDetailId;
    closeDetail();
    openEditor(id);
  }

  function deleteFromDetail() {
    if (!currentDetailId) return;
    if (!confirm('この記録を削除しますか？')) return;
    entries = entries.filter(e => e.id !== currentDetailId);
    save();
    closeDetail();
    render();
  }

  /* ===== UTILS ===== */
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ===== INIT ===== */
  render();
</script>
</body>
</html>
